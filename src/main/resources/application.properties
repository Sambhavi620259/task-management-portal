# ==========================
# Application
# ==========================
spring.application.name=task-management-portal

# ==========================
# Server
# ==========================
server.port=8080

# ==========================
# MySQL Database
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/task_management_portal?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# Hibernate / JPA
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================
# Logging
# ==========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==========================
# JWT Configuration
# ==========================
jwt.secret=mySuperSecretJwtKeyForTaskPortal2026SecureKey123456
jwt.expiration=86400000

# File Upload
file.upload-dir=uploads

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB